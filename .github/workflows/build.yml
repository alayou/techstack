name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  # 标签推送时触发
  workflow_dispatch:  # 允许手动触发

env:
  GO_VERSION: '1.25'
  PROJECT_NAME: techstack
  PACKAGE_NAME: github.com/alayou/techstack

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      revision: ${{ steps.version.outputs.revision }}
      built_at: ${{ steps.version.outputs.built_at }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version info
        id: version
        run: |
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "revision=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "built_at=$(date '+%Y-%m-%dT%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Go mod tidy
        run: go mod tidy

      - name: Create build directory
        run: mkdir -p build

      - name: Build Linux amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.revision=${{ steps.version.outputs.revision }} -X main.builtAt=${{ steps.version.outputs.built_at }}" \
            -o "build/${{ env.PROJECT_NAME }}-linux-amd64" \
            ${{ env.PACKAGE_NAME }}

      - name: Build Linux arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.revision=${{ steps.version.outputs.revision }} -X main.builtAt=${{ steps.version.outputs.built_at }}" \
            -o "build/${{ env.PROJECT_NAME }}-linux-arm64" \
            ${{ env.PACKAGE_NAME }}

      - name: Build Windows amd64
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.revision=${{ steps.version.outputs.revision }} -X main.builtAt=${{ steps.version.outputs.built_at }}" \
            -o "build/${{ env.PROJECT_NAME }}-windows-amd64.exe" \
            ${{ env.PACKAGE_NAME }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ github.ref_name }}
          path: build/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ github.ref_name }}
          path: build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            build/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries-${{ github.ref_name }}
          path: build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Linux amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.PROJECT_NAME }}:${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=local,dest=./build/docker-amd64

      - name: Extract Linux amd64 binary
        run: |
          mv build/docker-amd64/techstack build/
          rm -rf build/docker-amd64

      - name: Upload Docker artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-binaries
          path: build/techstack